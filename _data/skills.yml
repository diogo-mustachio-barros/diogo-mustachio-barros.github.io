# Level
# 1- 2 -> Basic knowledge with no practical experience
# 3- 4 -> Basic knowledge with limited practical experience
# 5- 6 -> Working knowledge with some practical experience
# 7- 8 -> Strong proficiency with the ability to perform tasks independently
# 9-10 -> Deep expertise and ability to mentor others

# Recency
# 0 -> Last used over a year ago
# 1 -> Used it in the last year
# 2 -> Regular use

